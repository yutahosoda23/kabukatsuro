# Claude Code Routines - 朝のスクリーニングメール
# 毎営業日 8:00 JST に実行

name: morning-stock-screening
schedule: daily 08:00 JST

prompt: |
  以下のコマンドを実行してください。
  
  ```
  cd stock-screening && python scripts/morning_mail.py
  ```
  
  エラーが出た場合はエラー内容を確認し、依存パッケージが不足していれば
  `pip install yfinance anthropic` を実行してから再試行してください。
  
  実行完了後、送信した銘柄数とエラーの有無を報告してください。

env:
  ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
  GMAIL_USER: $GMAIL_USER
  GMAIL_APP_PASSWORD: $GMAIL_APP_PASSWORD
  TO_EMAIL: $TO_EMAIL
