# Claude Code Routine - 朝のスクリーニングメール
# 毎営業日 8:00 JST に実行（土日・祝日はスクリプトが自動スキップ）

name: morning-stock-screening
schedule: daily 08:00 JST

prompt: |
  日本株のデイトレ向け朝メールを送信します。以下を順に実行してください。

  1. 依存パッケージを用意:
     pip install -q yfinance pandas xlrd jpholiday requests

  2. テクニカルスクリーニングを実行:
     python scripts/screener.py --out /tmp/screen.json
     ※ 出力に "SKIP"（終了コード10）が出たら本日は休場日です。
        以降の処理を中止し、メールは送らず「休場日のためスキップ」と報告して終了してください。

  3. 本日の好材料銘柄を Web 検索で10個選定してください。観点:
       - 決算（上方修正・増配・好決算）
       - 証券会社の目標株価引き上げ・買い推奨
       - 自社株買い発表 / M&A・提携・新製品 / 出来高急増・話題銘柄
     さらに、次の2つのランキングからも注目銘柄を拾ってください（拾った候補は必ずニュースで材料を裏取りすること）:
       - 夜間PTS取引高ランキング（最重要）: 「買付取引成立数」ではなく「買付取引未成率（買い注文の未成立比率）」を見る。
         未成立＝売り渋りで翌朝の寄りに買いが殺到しやすい。さらにその未成立の「件数」を必ず確認し、
         件数が1件だけ（単一大口）のものは除外、件数が多い銘柄を重視する。
       - Yahoo!ファイナンス 銘柄別投稿数ランキング（参考程度）: 投稿数が多い＝注目度が高い。注目度の目安として参照。
     結果を次のJSON形式で /tmp/hot.json に保存してください（説明文やコードフェンス不要、配列のみ）:
       [{"code":"7272","name":"ヤマハ発動機","price":1279,"reason":"Q1決算で営業利益+43.8%、通期増益予想"}, ...]

  4. メールを組み立てて送信:
     python scripts/mailer.py morning --screen /tmp/screen.json --hot /tmp/hot.json

  5. 完了後、各セクションの銘柄数とエラーの有無を報告してください。

env:
  GMAIL_USER: $GMAIL_USER
  GMAIL_APP_PASSWORD: $GMAIL_APP_PASSWORD
  TO_EMAIL: $TO_EMAIL
