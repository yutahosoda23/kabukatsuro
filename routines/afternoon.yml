# Claude Code Routine - 午後のスクリーニングメール
# 毎営業日 12:30 JST に実行（土日・祝日はスクリプトが自動スキップ）

name: afternoon-stock-screening
schedule: daily 12:30 JST

prompt: |
  日本株のデイトレ向け「午後から上がりそうな銘柄」メールを送信します。順に実行してください。

  1. 依存パッケージを用意:
     pip install -q yfinance pandas xlrd jpholiday requests

  2. 取引日かどうか判定:
     python scripts/screener.py --check-day-only
     ※ "SKIP"（終了コード10）が出たら本日は休場日です。
        以降を中止し、メールは送らず「休場日のためスキップ」と報告して終了してください。

  3. 午後（12:30以降）に上昇が期待できる銘柄を Web 検索で10個選定してください。観点:
       - 前場で出来高急増・押し目から反発しそう
       - 午後に材料出動が予想される（決算・IR等）
       - 日経平均・セクターの流れに連動しやすい
     結果を次のJSON形式で /tmp/afternoon.json に保存してください（説明文やコードフェンス不要、配列のみ）:
       [{"code":"7272","name":"ヤマハ発動機","reason":"前場で26週線タッチ後反発、出来高急増で午後の上昇に期待"}, ...]
     ※ 株価・前日比・出来高は送信スクリプトが yfinance で自動付加するので不要です。

  4. メールを組み立てて送信（午後はテクニカルのSection2・3は送りません）:
     python scripts/mailer.py afternoon --candidates /tmp/afternoon.json

  5. 完了後、銘柄数とエラーの有無を報告してください。

env:
  GMAIL_USER: $GMAIL_USER
  GMAIL_APP_PASSWORD: $GMAIL_APP_PASSWORD
  TO_EMAIL: $TO_EMAIL
